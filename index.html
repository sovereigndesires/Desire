<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sovereign Suite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap');

        :root { --gold: #d4af37; --dark: #050505; }
        
        body { 
            margin: 0; background: var(--dark); color: var(--gold); 
            font-family: 'Playfair Display', serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            text-align: center; background-size: cover; background-position: center;
            background-attachment: fixed; transition: background 2s ease;
        }

        /* Default Architect's View */
        .bg-default {
            background-image: linear-gradient(rgba(5, 5, 5, 0.95), rgba(5, 5, 5, 0.95)), 
                              url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070');
        }

        /* The Ghost Protocol (Amanda Only) */
        .bg-ghost {
            background-image: linear-gradient(rgba(5, 5, 5, 0.75), rgba(5, 5, 5, 0.75)), 
                              url('IMG_5825.jpeg'); /* Your stored file */
        }

        .vault { 
            border: 1px solid #2a2a2a; padding: 50px 35px; 
            background: rgba(10, 10, 10, 0.9); box-shadow: 0 0 80px #000;
            width: 100%; max-width: 480px; position: relative; z-index: 10;
            backdrop-filter: blur(12px);
        }

        h1 { 
            font-family: 'Cinzel', serif; letter-spacing: 10px; 
            text-transform: uppercase; font-size: 1.6rem; color: #fff; 
            margin-bottom: 5px;
        }
        .header-sub { font-style: italic; color: var(--gold); font-size: 0.8rem; margin-bottom: 35px; letter-spacing: 2px; }

        input, textarea { 
            background: rgba(0,0,0,0.7); border: 1px solid #333; color: #fff; 
            padding: 15px; width: 90%; outline: none; margin-bottom: 15px; text-align: center;
        }

        .btn { 
            border: 1px solid var(--gold); padding: 15px; color: var(--gold); 
            cursor: pointer; background: transparent; letter-spacing: 4px; 
            width: 100%; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; transition: 0.5s; 
        }
        .btn:hover { background: var(--gold); color: #000; }

        .feed { text-align: left; margin-top: 30px; max-height: 350px; overflow-y: auto; border-top: 1px solid #222; padding-top: 20px; scrollbar-width: none; }
        .drop { background: rgba(15, 15, 15, 0.6); padding: 20px; border-left: 1px solid var(--gold); margin-bottom: 15px; }
        .drop-user { font-family: 'Cinzel'; font-size: 0.55rem; color: #666; margin-bottom: 5px; }
        
        .file-label { font-size: 0.65rem; color: #888; cursor: pointer; border: 1px dashed #333; padding: 12px; display: block; margin-bottom: 15px; }
        #interactionZone { display: none; }
    </style>
</head>
<body class="bg-default">

    <div class="vault" id="gatekeeper">
        <h1>Sovereign</h1>
        <p class="header-sub">Validation Required</p>
        <input type="text" id="nameInput" placeholder="Name">
        <button class="btn" onclick="authenticate()">Unseal</button>
    </div>

    <div class="vault" id="suiteContent" style="display:none;">
        <h1 id="displayTitle"></h1>
        <p class="header-sub" id="tagline"></p>
        <div class="feed" id="liveFeed"></div>
        <div id="interactionZone">
            <textarea id="userMsg" placeholder="A thought for the Architect..."></textarea>
            <label class="file-label" for="file-upload">ATTACH VISUAL EVIDENCE (+)</label>
            <input type="file" id="file-upload" style="display:none;" accept="image/*">
            <button class="btn" id="sendBtn" onclick="sendData()">Submit to Vault</button>
            <button class="btn" id="burnBtn" style="display:none; color:#700; border-color:#400; margin-top:20px;" onclick="burnTheVault()">PURGE ALL DATA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCD5JEgpo7rckS_FR0s1DTTgwLIDTno4FA",
            authDomain: "private-suite.firebaseapp.com",
            projectId: "private-suite",
            storageBucket: "private-suite.firebasestorage.app",
            messagingSenderId: "1055447389510",
            appId: "1:1055447389510:web:538e3ff862cc866f794147"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = "318eb162e33966a8be888187ab3997f0";
        let userRole = "";

        function authenticate() {
            const name = document.getElementById("nameInput").value.trim();
            const lowerName = name.toLowerCase();
            const body = document.body;
            
            if (lowerName === "jerry") { 
                userRole = "Jerry"; 
                document.getElementById("burnBtn").style.display = "block";
            } else if (lowerName === "amanda") { 
                userRole = "Amanda"; 
                body.className = "bg-ghost"; 
            } else { alert("Access Denied."); return; }

            document.getElementById("displayTitle").innerText = userRole.toUpperCase();
            document.getElementById("tagline").innerText = (userRole === "Jerry") ? "Design with intent." : "Behold the masterpiece.";
            document.getElementById("gatekeeper").style.display = "none";
            document.getElementById("suiteContent").style.display = "block";
            document.getElementById("interactionZone").style.display = "block";
            loadFeed();
        }

        function loadFeed() {
            db.ref('vault').on('value', (snapshot) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const isJerry = userRole === "Jerry";
                    
                    let content = `<p style="color:#eee;">${data.text}</p>`;
                    if (data.img) {
                        if (isJerry) {
                            content += `<img src="${data.img}" style="max-width:100%; margin-top:10px;">`;
                        } else {
                            content += `<p style="font-style:italic; color:var(--gold); font-size:0.8rem; margin-top:10px;">The Architect is currently admiring your gift in private. You've definitely left an impression... 😉</p>`;
                        }
                    }

                    feed.innerHTML = `<div class="drop"><div class="drop-user">${data.user}</div>${content}</div>` + feed.innerHTML;
                });
            });
        }

        async function sendData() {
            const text = document.getElementById('userMsg').value;
            const fileInput = document.getElementById('file-upload');
            const btn = document.getElementById('sendBtn');
            let imageUrl = "";

            if (!text && !fileInput.files[0]) return;

            btn.innerText = "TRANSMITTING...";
            if (fileInput.files[0]) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                const result = await response.json();
                imageUrl = result.data.url;
            }

            db.ref('vault').push({ user: userRole, text: text, img: imageUrl, timestamp: Date.now() });
            document.getElementById('userMsg').value = "";
            fileInput.value = "";
            btn.innerText = "SUBMIT TO VAULT";
        }

        function burnTheVault() { if (confirm("Erase every trace?")) db.ref('vault').remove(); }
    </script>
</body>
</html>
