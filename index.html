<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sovereign Suite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap');

        :root { --gold: #d4af37; --dark: #050505; --grey: #c0c0c0; }
        
        body { 
            margin: 0; background: var(--dark); color: var(--gold); 
            font-family: 'Playfair Display', serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            text-align: center; background-size: cover; background-position: center;
            background-attachment: fixed; transition: background 1.5s ease-in-out;
            overflow: hidden;
            /* INITIAL LOGIN BACKGROUND */
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), 
                              url('https://images.unsplash.com/photo-1550965328-971701389868?auto=format&fit=crop&q=80&w=2070');
        }

        .vault-container {
            width: 85%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Real Wolf Sentinel - Faded and Powerful */
        .wolf-presence {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background-image: url('https://images.unsplash.com/photo-1590422443890-2e303960309e?auto=format&fit=crop&q=80&w=600');
            background-size: cover;
            background-position: center;
            filter: grayscale(100%) contrast(120%) opacity(0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .vault { 
            border: 1px solid #2a2a2a; 
            padding: 40px 20px; 
            background: rgba(10, 10, 10, 0.9); 
            box-shadow: 0 0 60px #000;
            width: 100%; 
            position: relative; 
            z-index: 10;
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 8px; text-transform: uppercase; font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .header-sub { font-style: italic; color: var(--gold); font-size: 0.65rem; margin-bottom: 25px; letter-spacing: 2px; }

        input { 
            background: rgba(0,0,0,0.8); border: 1px solid #333; color: #fff; 
            padding: 12px; width: 85%; outline: none; margin-bottom: 15px; 
            text-align: center; font-size: 0.8rem; border-radius: 0; 
            transition: border 0.3s;
        }
        input:focus { border-color: var(--gold); }

        .btn { 
            border: 1px solid var(--gold); padding: 12px; color: var(--gold); 
            cursor: pointer; background: transparent; letter-spacing: 3px; 
            width: 92%; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; 
            transition: 0.4s; 
        }
        .btn:hover { background: var(--gold); color: #000; letter-spacing: 5px; }

        .feed { text-align: left; margin-top: 20px; height: 250px; overflow-y: auto; border-top: 1px solid #222; padding-top: 15px; scrollbar-width: none; }
        .drop { background: rgba(20, 20, 20, 0.5); padding: 15px; border-left: 2px solid var(--gold); margin-bottom: 10px; }
        .drop-user { font-family: 'Cinzel'; font-size: 0.5rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        
        #interactionZone { display: none; margin-top: 15px; }
        textarea { background: rgba(0,0,0,0.8); border: 1px solid #333; color: #fff; padding: 10px; width: 92%; height: 70px; resize: none; font-family: inherit; font-size: 0.85rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="vault-container" id="gatekeeper">
        <!-- The Alpha Presence -->
        <div class="wolf-presence"></div>
        
        <div class="vault">
            <h1>Sovereign</h1>
            <p class="header-sub">Vetting Alpha Presence</p>
            <input type="text" id="nameInput" placeholder="Identify yourself...">
            <button class="btn" onclick="authenticate()">Claim Access</button>
        </div>
    </div>

    <div class="vault-container" id="suiteContent" style="display:none;">
        <div class="vault">
            <h1 id="displayTitle"></h1>
            <p class="header-sub" id="tagline"></p>
            <div class="feed" id="liveFeed"></div>
            <div id="interactionZone">
                <textarea id="userMsg" placeholder="Leave a scent..."></textarea>
                <button class="btn" id="sendBtn" onclick="sendData()">Submit Transmission</button>
                <button class="btn" id="burnBtn" style="display:none; color:#a00; border-color:#500; margin-top:20px; font-size: 0.5rem;" onclick="burnTheVault()">PURGE VAULT</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCD5JEgpo7rckS_FR0s1DTTgwLIDTno4FA",
            authDomain: "private-suite.firebaseapp.com",
            projectId: "private-suite",
            storageBucket: "private-suite.firebasestorage.app",
            messagingSenderId: "1055447389510",
            appId: "1:1055447389510:web:538e3ff862cc866f794147"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let userRole = "";

        function authenticate() {
            const nameInput = document.getElementById("nameInput").value.trim();
            const body = document.body;
            
            if (nameInput === "The Architect") { 
                userRole = "The Architect"; 
                document.getElementById("burnBtn").style.display = "block";
                body.style.backgroundImage = "linear-gradient(rgba(5, 5, 5, 0.95), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070')";
            } else if (nameInput.toLowerCase() === "amanda") { 
                userRole = "Amanda"; 
                body.style.backgroundImage = "linear-gradient(rgba(5, 5, 5, 0.75), rgba(5, 5, 5, 0.75)), url('IMG_5825.jpeg')";
            } else { 
                userRole = nameInput; 
            }

            document.getElementById("displayTitle").innerText = userRole.toUpperCase();
            document.getElementById("tagline").innerText = (userRole === "The Architect") ? "Control the hunt." : "Welcome home, Lone Wolf.";
            document.getElementById("gatekeeper").style.display = "none";
            document.getElementById("suiteContent").style.display = "block";
            document.getElementById("interactionZone").style.display = "block";
            loadFeed();
        }

        function loadFeed() {
            db.ref('vault').on('value', (snapshot) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    feed.innerHTML = `<div class="drop"><div class="drop-user">${data.user}</div><p style="color:#eee; font-size: 0.8rem;">${data.text}</p></div>` + feed.innerHTML;
                });
            });
        }

        function sendData() {
            const text = document.getElementById('userMsg').value;
            if (!text) return;
            db.ref('vault').push({ user: userRole, text: text, timestamp: Date.now() });
            document.getElementById('userMsg').value = "";
        }

        function burnTheVault() { if (confirm("Erase every trace?")) db.ref('vault').remove(); }
    </script>
</body>
</html>
