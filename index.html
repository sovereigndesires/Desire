<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sovereign Suite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap');
        
        :root { --gold: #d4af37; --dark: #050505; }
        
        body { 
            margin: 0;
            background: var(--dark); color: var(--gold); 
            font-family: 'Playfair Display', serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            text-align: center; 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; transition: background 1.5s ease-in-out;
            overflow: hidden;
            background-image: linear-gradient(rgba(5, 5, 5, 0.75), rgba(5, 5, 5, 0.76)), 
                              url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2070');
        }

        .vault-container { width: 80%; max-width: 300px; display: flex; flex-direction: column; align-items: center; }

        .vault { 
            border: 1px solid #2a2a2a;
            padding: 25px 15px; 
            background: rgba(10, 10, 10, 0.9); box-shadow: 0 0 40px #000;
            width: 100%; position: relative; z-index: 10;
            backdrop-filter: blur(8px);
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 6px; text-transform: uppercase;
        font-size: 1rem; color: #fff; margin-bottom: 5px; }
        
        .header-sub { font-style: italic; color: var(--gold);
        font-size: 0.6rem; margin-bottom: 20px; letter-spacing: 2px; }

        input, textarea { 
            background: rgba(0,0,0,0.8);
            border: 1px solid #333; color: #fff; 
            padding: 10px; width: 85%; outline: none; margin-bottom: 12px; 
            text-align: center; font-size: 0.75rem; border-radius: 0;
        }

        .btn { 
            border: 1px solid var(--gold);
            padding: 10px; color: var(--gold); 
            cursor: pointer; background: transparent; letter-spacing: 2px; 
            width: 90%; text-transform: uppercase; font-size: 0.65rem; font-weight: bold; 
            transition: 0.4s;
            margin-bottom: 8px;
        }
        
        .btn:hover { background: var(--gold); color: #000; }

        .file-label {
            font-size: 0.55rem;
            color: #666; cursor: pointer; border: 1px dashed #333;
            padding: 8px; display: block; margin-bottom: 12px; width: 85%;
        }

        .feed { text-align: left; margin-top: 15px; height: 220px; overflow-y: auto;
        border-top: 1px solid #222; padding-top: 10px; scrollbar-width: none; }
        
        .drop { background: rgba(15, 15, 15, 0.6);
        padding: 10px; border-left: 1px solid var(--gold); margin-bottom: 10px; }
        
        .drop-user { font-family: 'Cinzel';
        font-size: 0.45rem; color: #555; text-transform: uppercase; margin-bottom: 3px; }
        
        .drop img { max-width: 100%;
        margin-top: 8px; border: 1px solid #333; }
        
        #interactionZone { display: none; width: 100%; }
        
        #burnBtn { color: #a00; border-color: #500; font-size: 0.5rem; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="vault-container" id="gatekeeper">
        <div class="vault">
            <h1>Sovereign</h1>
            <p class="header-sub">Exclusive Access Protocol</p>
            <input type="text" id="nameInput" placeholder="Who enters?">
            <button class="btn" onclick="authenticate()">Claim Access</button>
        </div>

        <div class="vault" style="margin-top: 15px; padding: 5px;">
            <video width="100%" autoplay muted loop playsinline>
                <source src="hunt.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <div class="vault-container" id="suiteContent" style="display:none;">
        <div class="vault">
            <h1 id="displayTitle"></h1>
            <p class="header-sub" id="tagline"></p>
            <div class="feed" id="liveFeed"></div>
            <div id="interactionZone">
                <textarea id="userMsg" placeholder="Leave a scent..."></textarea>
                
                <label class="file-label" for="file-upload">UPLOAD EVIDENCE (+)</label>
                <input type="file" id="file-upload" style="display:none;" accept="image/*">
                
                <button class="btn" id="sendBtn" onclick="sendData()">Submit Transmission</button>
                <button class="btn" id="burnBtn" style="display:none;" onclick="burnTheVault()">PURGE ALL RECORDS</button>
            </div>
        </div>
    </div>

    <script>
        // Database Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCD5JEgpo7rckS_FR0s1DTTgwLIDTno4FA",
            authDomain: "private-suite.firebaseapp.com",
            projectId: "private-suite",
            storageBucket: "private-suite.firebasestorage.app",
            messagingSenderId: "1055447389510",
            appId: "1:1055447389510:web:538e3ff862cc866f794147"
        };
        
        // Initialize connections
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = "318eb162e33966a8be888187ab3997f0";
        let userRole = "";

        // Authentication & Display Logic
        function authenticate() {
            const nameInput = document.getElementById("nameInput").value.trim();
            const body = document.body;
            
            // STRICT GATEKEEPING
            if (nameInput === "The Architect") { 
                userRole = "The Architect";
                document.getElementById("burnBtn").style.display = "block";
                
                // Sets background for The Architect and uses default cover sizing
                body.style.backgroundImage = "linear-gradient(rgba(5, 5, 5, 0.95), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2070')";
                body.style.backgroundSize = "cover";
                
            } else if (nameInput.toLowerCase() === "amanda") { 
                userRole = "Amanda";
                
                // Sets background for Amanda
                body.style.backgroundImage = "linear-gradient(rgba(5, 5, 5, 0.70), rgba(5, 5, 5, 0.70)), url('IMG_5825.jpg')";
                
                // Forces the background to be dynamically sized to 100% of screen width (vw) and height (vh)
                body.style.backgroundSize = "100vw 100vh"; 
                
            } else { 
                // DENIED
                alert("Access Denied. You don't belong here.");
                document.getElementById("nameInput").value = "";
                return;
            }

            // Update UI elements based on authentication success
            document.getElementById("displayTitle").innerText = userRole.toUpperCase();
            document.getElementById("tagline").innerText = (userRole === "The Architect") ? "Control the hunt." : "Welcome home, Lone Wolf.";
            document.getElementById("gatekeeper").style.display = "none";
            document.getElementById("suiteContent").style.display = "block";
            document.getElementById("interactionZone").style.display = "block";
            
            loadFeed();
        }

        // Data Retrieval Logic
        function loadFeed() {
            db.ref('vault').on('value', (snapshot) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    let content = `<p style="color:#eee; font-size: 0.8rem; margin:0;">${data.text}</p>`;
                    if (data.img) { content += `<img src="${data.img}">`; }
                    feed.innerHTML = `<div class="drop"><div class="drop-user">${data.user}</div>${content}</div>` + feed.innerHTML;
                });
            });
        }

        // Data Submission Logic
        async function sendData() {
            const text = document.getElementById('userMsg').value;
            const fileInput = document.getElementById('file-upload');
            const btn = document.getElementById('sendBtn');
            let imageUrl = "";

            if (!text && !fileInput.files[0]) return;
            btn.innerText = "...";
            
            // Handle image uploads if a file is present
            if (fileInput.files[0]) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                    const result = await response.json();
                    imageUrl = result.data.url;
                } catch (e) { 
                    console.error("Upload failed");
                }
            }

            // Push data to Firebase
            db.ref('vault').push({ user: userRole, text: text, img: imageUrl, timestamp: Date.now() });
            
            // Reset input fields
            document.getElementById('userMsg').value = "";
            fileInput.value = "";
            btn.innerText = "Submit Transmission";
        }

        // Vault Purge Logic
        function burnTheVault() { 
            if (confirm("Erase all evidence of the hunt?")) {
                db.ref('vault').remove();
            }
        }
    </script>
</body>
</html>
