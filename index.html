<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sovereign Suite</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap');

        :root { --gold: #d4af37; --dark: #050505; }
        
        body { 
            margin: 0; background: var(--dark); color: var(--gold); 
            font-family: 'Playfair Display', serif; display: flex; 
            justify-content: center; align-items: center; min-height: 100vh; 
            text-align: center; background-size: cover; background-position: center;
            background-attachment: fixed; transition: background 2s ease;
            overflow: hidden;
            /* NEW ENTRY BACKGROUND: The Alpha Wolf */
            background-image: linear-gradient(rgba(5, 5, 5, 0.7), rgba(5, 5, 5, 0.7)), 
                              url('https://images.unsplash.com/photo-1590422443890-2e303960309e?auto=format&fit=crop&q=80&w=2070');
        }

        /* The Ghost Protocol (Amanda's internal page) remains her masterpiece */
        .bg-ghost {
            background-image: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.8)), 
                              url('IMG_5825.jpeg');
        }

        .vault { 
            border: 1px solid #2a2a2a; padding: 20px 15px; 
            background: rgba(10, 10, 10, 0.85); box-shadow: 0 0 50px #000;
            width: 80%; max-width: 320px; position: relative; z-index: 10;
            backdrop-filter: blur(6px);
            margin: auto;
        }

        h1 { font-family: 'Cinzel', serif; letter-spacing: 6px; text-transform: uppercase; font-size: 1.1rem; color: #fff; margin-bottom: 2px; }
        .header-sub { font-style: italic; color: var(--gold); font-size: 0.6rem; margin-bottom: 15px; letter-spacing: 1px; }

        input { background: rgba(0,0,0,0.7); border: 1px solid #333; color: #fff; padding: 8px; width: 85%; outline: none; margin-bottom: 10px; text-align: center; font-size: 0.75rem; border-radius: 0; -webkit-appearance: none; }

        textarea { 
            background: rgba(0,0,0,0.7); border: 1px solid #333; color: #fff; 
            padding: 8px; width: 85%; outline: none; margin-bottom: 10px; 
            height: 55px; resize: none; overflow-y: auto; font-family: 'Georgia', serif; font-size: 0.8rem;
            border-radius: 0; -webkit-appearance: none;
        }
        
        .btn { 
            border: 1px solid var(--gold); padding: 10px; color: var(--gold); 
            cursor: pointer; background: transparent; letter-spacing: 2px; 
            width: 88%; text-transform: uppercase; font-size: 0.6rem; font-weight: bold; transition: 0.5s; 
        }
        .btn:hover { background: var(--gold); color: #000; }

        .feed { 
            text-align: left; margin-top: 15px; 
            height: 200px; overflow-y: auto; border-top: 1px solid #222; padding-top: 10px; 
            scrollbar-width: none;
        }

        .drop { background: rgba(15, 15, 15, 0.4); padding: 12px; border-left: 1px solid var(--gold); margin-bottom: 8px; }
        .drop-user { font-family: 'Cinzel'; font-size: 0.45rem; color: #444; margin-bottom: 2px; }
        
        .file-label { font-size: 0.55rem; color: #555; cursor: pointer; border: 1px dashed #222; padding: 6px; display: block; margin-bottom: 8px; width: 80%; margin-left: auto; margin-right: auto; }
        #interactionZone { display: none; }
    </style>
</head>
<body>

    <div class="vault" id="gatekeeper">
        <h1>Sovereign</h1>
        <p class="header-sub">Alpha Presence Detected</p>
        <input type="text" id="nameInput" placeholder="Who enters?">
        <button class="btn" onclick="authenticate()">Claim Access</button>
    </div>

    <div class="vault" id="suiteContent" style="display:none;">
        <h1 id="displayTitle"></h1>
        <p class="header-sub" id="tagline"></p>
        <div class="feed" id="liveFeed"></div>
        <div id="interactionZone">
            <textarea id="userMsg" placeholder="Leave a scent..."></textarea>
            <label class="file-label" for="file-upload">TRANSMIT EVIDENCE (+)</label>
            <input type="file" id="file-upload" style="display:none;" accept="image/*">
            <button class="btn" id="sendBtn" onclick="sendData()">Submit</button>
            <button class="btn" id="burnBtn" style="display:none; color:#700; border-color:#400; margin-top:10px; font-size: 0.45rem;" onclick="burnTheVault()">PURGE VAULT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCD5JEgpo7rckS_FR0s1DTTgwLIDTno4FA",
            authDomain: "private-suite.firebaseapp.com",
            projectId: "private-suite",
            storageBucket: "private-suite.firebasestorage.app",
            messagingSenderId: "1055447389510",
            appId: "1:1055447389510:web:538e3ff862cc866f794147"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const imgbbKey = "318eb162e33966a8be888187ab3997f0";
        let userRole = "";

        function authenticate() {
            const nameInput = document.getElementById("nameInput").value.trim();
            const body = document.body;
            
            if (nameInput === "The Architect") { 
                userRole = "The Architect"; 
                document.getElementById("burnBtn").style.display = "block";
            } else if (nameInput.toLowerCase() === "amanda") { 
                userRole = "Amanda"; 
                body.style.backgroundImage = "linear-gradient(rgba(5, 5, 5, 0.75), rgba(5, 5, 5, 0.75)), url('IMG_5825.jpeg')";
            } else { 
                userRole = nameInput; 
            }

            document.getElementById("displayTitle").innerText = userRole.toUpperCase();
            document.getElementById("tagline").innerText = (userRole === "The Architect") ? "Control the hunt." : "Welcome home, Lone Wolf.";
            document.getElementById("gatekeeper").style.display = "none";
            document.getElementById("suiteContent").style.display = "block";
            document.getElementById("interactionZone").style.display = "block";
            loadFeed();
        }

        function loadFeed() {
            db.ref('vault').on('value', (snapshot) => {
                const feed = document.getElementById('liveFeed');
                feed.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const isArchitect = userRole === "The Architect";
                    let content = `<p style="color:#eee; font-size: 0.75rem;">${data.text}</p>`;
                    if (data.img) {
                        if (isArchitect) {
                            content += `<img src="${data.img}" style="max-width:100%; margin-top:8px;">`;
                        } else {
                            content += `<p style="font-style:italic; color:var(--gold); font-size:0.65rem; margin-top:5px;">The Architect is watching... 😉</p>`;
                        }
                    }
                    feed.innerHTML = `<div class="drop"><div class="drop-user">${data.user}</div>${content}</div>` + feed.innerHTML;
                });
            });
        }

        async function sendData() {
            const text = document.getElementById('userMsg').value;
            const fileInput = document.getElementById('file-upload');
            const btn = document.getElementById('sendBtn');
            let imageUrl = "";

            if (!text && !fileInput.files[0]) return;

            btn.innerText = "...";
            if (fileInput.files[0]) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, { method: "POST", body: formData });
                const result = await response.json();
                imageUrl = result.data.url;
            }

            db.ref('vault').push({ user: userRole, text: text, img: imageUrl, timestamp: Date.now() });
            document.getElementById('userMsg').value = "";
            fileInput.value = "";
            btn.innerText = "Submit";
        }

        function burnTheVault() { if (confirm("Erase every trace?")) db.ref('vault').remove(); }
    </script>
</body>
</html>
